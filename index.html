<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Facturación - Siebel 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">Simulador Facturación</div>
            <div class="help" onclick="abrirAyuda()">?</div>
        </div>

        <div class="card">
            <label>Fecha instalación</label>
            <input type="date" id="fecha">
            <label>Valor plan</label>
            <input type="number" id="plan" placeholder="0">
            <label>Anticipo</label>
            <input type="number" id="anticipo" placeholder="0">
            <div class="botones">
                <button onclick="simular()">Simular</button>
                <button class="btn-clear" onclick="limpiar()">Limpiar</button>
            </div>
        </div>

        <div id="meses" class="meses"></div>

        <div class="timeline" id="timeline">
            <div class="line"></div>
            <div id="inst" class="event install bottom">I</div>
            <div id="instLabel" class="label bottom">Inst</div>
            <div id="fact" class="event invoice bottom">1</div>
            <div id="factLabel" class="label bottom">Factura</div>
            <div id="pay" class="event pay top">P</div>
            <div id="payLabel" class="label top">Pago</div>
            <div id="vence" class="event charge top">V</div>
            <div id="venceLabel" class="label top">Vence</div>
            
            <div id="fact2" class="event invoice bottom" style="display:none">2</div>
            <div id="fact2Label" class="label bottom" style="display:none">Factura 2</div>
            <div id="vence2" class="event charge top" style="display:none">V</div>
            <div id="vence2Label" class="label top" style="display:none">Vence</div>
        </div>

        <div id="info" class="result"></div>

        <div id="bannerChurn" class="churn-banner">
            <h4 style="font-size:13px; color:white">🚨 RIESGO CRÍTICO: Early Churn</h4>
            <p style="font-size:11px; color:#ffdadd">Cuenta nueva con pago atrasado. ¡Gestión inmediata!</p>
        </div>

        <div id="detalleFacturacion" class="result"></div>
    </div>

    <div id="modalAyuda" class="modal">
        <div class="modal-content">
            <div style="text-align:right; font-weight:bold; cursor:pointer" onclick="cerrarAyuda()">CERRAR ✖</div>
            <img src="assets/Imagenes/Diapositiva2.PNG">
            <img src="assets/Imagenes/Diapositiva3.PNG">
            <img src="assets/Imagenes/Diapositiva4.PNG">
            <img src="assets/Imagenes/Diapositiva5.PNG">
            <img src="assets/Imagenes/Diapositiva6.PNG">
            <img src="assets/Imagenes/Diapositiva7.PNG">
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
